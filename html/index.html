<!-- html/index.html -->
<!DOCTYPE html>
<html lang="hu">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced Notes</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    background:#050505;
    color:white;
    overflow:hidden;
}

/* TITLEBAR */

#titlebar{
    width:100%;
    height:48px;

    background:#0d0d0d;

    border-bottom:1px solid #1a1a1a;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 14px;

    user-select:none;
    -webkit-user-select:none;
    -webkit-app-region:drag;
}

.title-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo{
    width:22px;
    height:22px;

    object-fit:contain;

    border-radius:6px;
}

.title{
    font-size:14px;
    font-weight:700;
    color:#f1f1f1;
}

.top-actions{
    display:flex;
    align-items:center;
    gap:10px;

    margin-left:20px;

    -webkit-app-region:no-drag;
}

.settings-btn{
    background:#151515;

    border:1px solid #222;

    color:white;

    padding:8px 14px;

    border-radius:12px;

    cursor:pointer;

    transition:0.2s;
}

.settings-btn:hover{
    background:#1f1f1f;
}

/* WINDOW BUTTONS */

.window-buttons{
    display:flex;
    align-items:center;
    gap:8px;

    -webkit-app-region:no-drag;
}

.win-btn{
    width:14px;
    height:14px;

    border-radius:50%;

    cursor:pointer;

    transition:0.2s;
}

.win-btn:hover{
    transform:scale(1.12);
}

.close{
    background:#ef4444;
}

.minimize{
    background:#facc15;
}

.maximize{
    background:#22c55e;
}

/* APP */

#app{
    width:100%;
    height:calc(100vh - 48px);

    display:flex;
}

/* SIDEBAR */

#sidebar{
    width:330px;

    background:#090909;

    border-right:1px solid #1a1a1a;

    display:flex;
    flex-direction:column;
}

.sidebar-top{
    padding:16px;

    border-bottom:1px solid #1a1a1a;
}

.search{
    width:100%;

    background:#111;

    border:1px solid #1f1f1f;

    color:white;

    padding:13px;

    border-radius:14px;

    outline:none;

    margin-bottom:12px;

    transition:0.2s;
}

.search:focus{
    border-color:#3b82f6;
}

.add-btn{
    width:100%;

    background:linear-gradient(135deg,#2563eb,#1d4ed8);

    border:none;

    color:white;

    padding:13px;

    border-radius:14px;

    font-weight:700;

    cursor:pointer;

    transition:0.2s;
}

.add-btn:hover{
    transform:translateY(-1px);
    opacity:0.95;
}

#notes-list{
    flex:1;

    overflow-y:auto;

    padding:12px;
}

.note-item{
    background:#101010;

    border:1px solid #1c1c1c;

    border-radius:16px;

    padding:16px;

    margin-bottom:12px;

    cursor:pointer;

    transition:0.2s;
}

.note-item:hover{
    background:#161616;
    border-color:#2c2c2c;
}

.note-item.active{
    border-color:#2563eb;

    box-shadow:0 0 18px rgba(37,99,235,0.25);
}

.note-title{
    font-size:16px;
    font-weight:700;

    margin-bottom:6px;
}

.note-preview{
    font-size:13px;

    opacity:0.65;

    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

/* EDITOR */

#editor{
    flex:1;

    display:flex;
    flex-direction:column;

    background:#050505;
}

.toolbar{
    height:70px;

    border-bottom:1px solid #1a1a1a;

    display:flex;
    align-items:center;

    gap:10px;

    padding:0 18px;
}

.tool-btn{
    background:#111;

    border:1px solid #1f1f1f;

    color:white;

    padding:11px 15px;

    border-radius:14px;

    cursor:pointer;

    transition:0.2s;

    font-weight:600;
}

.tool-btn:hover{
    background:#181818;
}

#titleInput{
    width:100%;

    background:none;

    border:none;
    outline:none;

    color:white;

    padding:28px 28px 10px;

    font-size:34px;
    font-weight:800;
}

#contentInput{
    flex:1;

    background:none;

    border:none;
    outline:none;

    color:#ddd;

    resize:none;

    padding:20px 28px;

    font-size:17px;

    line-height:1.8;
}

.bottom-bar{
    height:45px;

    border-top:1px solid #1a1a1a;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 22px;

    font-size:13px;

    color:#888;
}

/* SETTINGS */

#settingsModal{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.7);

    display:none;
    align-items:center;
    justify-content:center;

    z-index:9999;
}

.settings-box{
    width:420px;

    background:#0f0f0f;

    border:1px solid #1f1f1f;

    border-radius:24px;

    padding:24px;
}

.settings-title{
    font-size:26px;
    font-weight:800;

    margin-bottom:22px;
}

.setting-label{
    margin-bottom:10px;

    opacity:0.7;
}

.language-select{
    width:100%;

    background:#151515;

    border:1px solid #222;

    color:white;

    padding:13px;

    border-radius:14px;

    outline:none;
}

.close-settings{
    width:100%;

    margin-top:18px;

    background:linear-gradient(135deg,#2563eb,#1d4ed8);

    border:none;

    color:white;

    padding:13px;

    border-radius:14px;

    font-weight:700;

    cursor:pointer;
}

/* SCROLLBAR */

::-webkit-scrollbar{
    width:7px;
}

::-webkit-scrollbar-thumb{
    background:#222;
    border-radius:20px;
}

</style>
</head>

<body>

<div id="titlebar">

    <div style="display:flex;align-items:center;">

        <div class="title-left">

            <img
                src="icon.png"
                class="logo"
            >

            <div class="title">
                Advanced Notes
            </div>

        </div>

        <div class="top-actions">

            <button
                class="settings-btn"
                onclick="openSettings()"
            >
                ⚙ Settings
            </button>

        </div>

    </div>

    <div class="window-buttons">

        <div
            class="win-btn minimize"
            onclick="minimizeApp()"
        ></div>

        <div
            class="win-btn maximize"
            onclick="maximizeApp()"
        ></div>

        <div
            class="win-btn close"
            onclick="closeApp()"
        ></div>

    </div>

</div>

<div id="app">

    <div id="sidebar">

        <div class="sidebar-top">

            <input
                class="search"
                type="text"
                placeholder="Search..."
                id="searchInput"
            >

            <button
                class="add-btn"
                onclick="createNote()"
            >
                + New Note
            </button>

        </div>

        <div id="notes-list"></div>

    </div>

    <div id="editor">

        <div class="toolbar">

            <button
                class="tool-btn"
                onclick="manualSave()"
            >
                💾 Save
            </button>

            <button
                class="tool-btn"
                onclick="deleteNote()"
            >
                🗑 Delete
            </button>

            <button
                class="tool-btn"
                onclick="duplicateNote()"
            >
                📄 Duplicate
            </button>

            <button
                class="tool-btn"
                onclick="exportNotes()"
            >
                ⬇ Export
            </button>

        </div>

        <input
            id="titleInput"
            placeholder="Note title..."
        >

        <textarea
            id="contentInput"
            placeholder="Start typing..."
        ></textarea>

        <div class="bottom-bar">

            <span id="charCount">
                0 characters
            </span>

            <span id="saveStatus">
                Not saved
            </span>

        </div>

    </div>

</div>

<!-- SETTINGS -->

<div id="settingsModal">

    <div class="settings-box">

        <div class="settings-title">
            Settings
        </div>

        <div class="setting-label">
            Language
        </div>

        <select
            class="language-select"
            id="languageSelect"
        >
            <option>Magyar</option>
            <option>English</option>
            <option>Español</option>
            <option>Polski</option>
            <option>Русский</option>
        </select>

        <button
            class="close-settings"
            onclick="closeSettings()"
        >
            Done
        </button>

    </div>

</div>

<script>

/* SETTINGS */

function openSettings(){

    document.getElementById(
        "settingsModal"
    ).style.display = "flex";

}

function closeSettings(){

    document.getElementById(
        "settingsModal"
    ).style.display = "none";

}

/* WINDOW BUTTONS */

async function closeApp(){

    if(window.pywebview){

        await window.pywebview
        .api
        .close_app();

    }

}

async function minimizeApp(){

    if(window.pywebview){

        await window.pywebview
        .api
        .minimize_app();

    }

}

async function maximizeApp(){

    if(window.pywebview){

        await window.pywebview
        .api
        .toggle_maximize();

    }

}

/* NOTES */

let notes = [];

let currentNote = null;

const notesList =
document.getElementById("notes-list");

const titleInput =
document.getElementById("titleInput");

const contentInput =
document.getElementById("contentInput");

const searchInput =
document.getElementById("searchInput");

const charCount =
document.getElementById("charCount");

const saveStatus =
document.getElementById("saveStatus");


async function loadNotes(){

    notes =
    await window.pywebview
    .api
    .load_notes();

    renderNotes();

    if(notes.length > 0){

        openNote(notes[0].id);

    }

}


async function saveNotes(){

    await window.pywebview
    .api
    .save_notes(notes);

    saveStatus.innerText =
    "Saved: " +
    new Date().toLocaleTimeString();

}


function createNote(){

    const note = {

        id:Date.now(),

        title:"New Note",

        content:"",

        created:new Date().toISOString(),

        updated:new Date().toISOString()

    };

    notes.unshift(note);

    renderNotes();

    openNote(note.id);

    saveNotes();

}


function renderNotes(){

    notesList.innerHTML = "";

    const search =
    searchInput.value.toLowerCase();

    notes
    .filter(note =>

        note.title
        .toLowerCase()
        .includes(search)

        ||

        note.content
        .toLowerCase()
        .includes(search)

    )
    .forEach(note => {

        const div =
        document.createElement("div");

        div.className = "note-item";

        if(
            currentNote &&
            currentNote.id === note.id
        ){

            div.classList.add("active");

        }

        div.innerHTML = `

            <div class="note-title">
                ${note.title}
            </div>

            <div class="note-preview">
                ${note.content}
            </div>

        `;

        div.onclick = () =>
        openNote(note.id);

        notesList.appendChild(div);

    });

}


function openNote(id){

    currentNote =
    notes.find(n => n.id === id);

    if(!currentNote) return;

    titleInput.value =
    currentNote.title;

    contentInput.value =
    currentNote.content;

    updateCharCount();

    renderNotes();

}


function updateCurrentNote(){

    if(!currentNote) return;

    currentNote.title =
    titleInput.value;

    currentNote.content =
    contentInput.value;

    currentNote.updated =
    new Date().toISOString();

    updateCharCount();

    renderNotes();

    saveNotes();

}


function deleteNote(){

    if(!currentNote) return;

    notes =
    notes.filter(n =>
        n.id !== currentNote.id
    );

    currentNote = null;

    titleInput.value = "";

    contentInput.value = "";

    renderNotes();

    saveNotes();

}


function duplicateNote(){

    if(!currentNote) return;

    const clone = {

        ...currentNote,

        id:Date.now(),

        title:
        currentNote.title +
        " Copy"

    };

    notes.unshift(clone);

    renderNotes();

    saveNotes();

}


function exportNotes(){

    const blob = new Blob(

        [JSON.stringify(notes,null,4)],

        {type:"application/json"}

    );

    const a =
    document.createElement("a");

    a.href =
    URL.createObjectURL(blob);

    a.download =
    "notes_export.json";

    a.click();

}


function updateCharCount(){

    charCount.innerText =

    contentInput.value.length +

    " characters";

}


function manualSave(){

    saveNotes();

}

titleInput.addEventListener(
    "input",
    updateCurrentNote
);

contentInput.addEventListener(
    "input",
    updateCurrentNote
);

searchInput.addEventListener(
    "input",
    renderNotes
);

window.addEventListener(
    "pywebviewready",
    loadNotes
);

</script>

</body>
</html>
